- title: "Health Economics"
  level: "Master in Public Health (1st-year)"
  role: "Lecture (12h) in English"
  institution: "EHESP"
  year: "2025-2026"
  description: "This course introduces Master of Public Health (MPH) students to health economics and the socioeconomic determinants of health. The first part covers core theories in health economics and how health is modelled within an economic framework. The second part examines the determinants of health using econometric methods. The final section highlights the importance of health economics in public health policy design and the value of understanding underlying mechanisms."

  - title: "Econometrics"
  level: "Second-year students (equivalent to 3rd-year undergraduate level)"
  role: "Tutorial (6h) in French"
  institution: "ENSAI"
  year: "2025-2026"
  description: "This tutorial is designed for students in the ENSAI–Paris Dauphine double degree programme to strengthen their understanding of econometrics at undergraduate level in economics."

- title: "Macroeconomics - International Track"
  level: "Second-year Undergraduate (L2)"
  role: "Tutorial (36h) in French"
  institution: "Faculty of Economics, University of Rennes"
  year: "2025-2026"
  description: "This tutorial supports group projects in which students analyse a macroeconomic crisis using tools covered in the course. Students are expected to connect their work to macroeconomic theories and produce a structured analysis of the chosen crisis."

- title: "Macroeconomics - International Track"
  level: "Second-year Undergraduate (L2) - International Track"
  role: "Tutorial (40h) in English"
  institution: "Faculty of Economics, University of Rennes"
  year: "2024-2025"
  description: "This tutorial introduces key macroeconomic frameworks, including the IS–LM model, the AS–AD model, and the Taylor rule, as well as the role of central banks in modern economies. It aims to strengthen students’ ability to apply theoretical tools to contemporary macroeconomic issues and interpret policy decisions in a structured analytical framework."

- title: "Macroeconomics"
  level: "First-year Undergraduate (L1)"
  role: "Tutorial (24h) in French"
  institution: "Faculty of Economics, University of Rennes"
  year: "2024-2025"
  description: "This tutorial supports group projects in which students compare key macroeconomic indicators across two economies and construct an Excel-based dashboard. It combines theoretical foundations with practical data analysis. Students present their results in a final presentation."
